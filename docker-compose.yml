services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drivenow
      POSTGRES_PASSWORD: drivenow
      POSTGRES_DB: drivenow
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivenow -d drivenow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://drivenow:drivenow@db:5432/drivenow
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/app.log
      REDIS_URL: redis://redis:6379/0
      TZ: UTC
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
